<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCROLL + TELL | Editorial Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;700&family=Inter:wght@400;700;900&family=Crimson+Pro:ital,wght@1,400;1,700&family=Rubik+Bubbles&family=Modak&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
      :root {
        --paper: #f0ede4;
        --ink: #0b0b0b;
        --rainbow: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00, #00ff00, #ff0000);
      }
      body {
        background-color: var(--paper);
        color: var(--ink);
        font-family: 'Inter', sans-serif;
        margin: 0;
        overflow-x: hidden;
      }
      *, *::before, *::after { box-sizing: border-box; }
      .bg-grid {
        background-image:
          linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .font-headline { font-family: 'Archivo Black', sans-serif; font-style: italic; }
      .font-mono { font-family: 'IBM Plex Mono', monospace; }
      .font-serif { font-family: 'Crimson Pro', serif; font-style: italic; }
      .grain-overlay {
        position: fixed; inset: 0;
        background-image: url("https://www.transparenttextures.com/patterns/p6.png");
        opacity: 0.12; pointer-events: none; z-index: 9999;
      }
      .frame-border {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        border: 40px solid white; pointer-events: none; z-index: 9000;
        box-shadow: inset 0 0 0 1px #ddd;
      }
      .frame-text {
        position: absolute; font-family: 'IBM Plex Mono', monospace;
        font-size: 11px; font-weight: 700; white-space: nowrap;
        text-transform: uppercase; color: #333; display: flex;
        align-items: center; gap: 8px;
      }
      .frame-top { top: -28px; left: 50%; transform: translateX(-50%); }
      .frame-bottom { bottom: -28px; left: 50%; transform: translateX(-50%) rotate(180deg); }
      .rainbow-hover-row:hover {
        background: var(--rainbow); background-size: 200% 200%;
        animation: flow 2s linear infinite; color: white;
      }
      @keyframes flow {
        0% { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
      }
      .archive-table { width: 100%; border-collapse: collapse; }
      .archive-table td {
        border: 1px solid #999; padding: 12px 16px;
        font-family: 'IBM Plex Mono', monospace; font-size: 14px;
        transition: color 0.2s ease;
      }
      .brutalist-card { border: 1px solid var(--ink); background: white; }
      .markdown-body { width: 100%; max-width: 100%; }
      .markdown-body p {
        margin-bottom: 1.5rem; word-break: break-word;
        overflow-wrap: anywhere; white-space: normal; max-width: 100%;
      }
      .markdown-body p:last-child { margin-bottom: 0; }
      .custom-scrollbar::-webkit-scrollbar { width: 8px; }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f0ede4; border-left: 1px solid rgba(0,0,0,0.1);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #00FF00; border: 2px solid #f0ede4; border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #00CC00; }
      ::-webkit-scrollbar { width: 0px; }
    </style>
  </head>
  <body>
    <div class="grain-overlay"></div>
    <div id="root"></div>

So they join things. Run clubs in 2024. Supper clubs in 2025. Now recreational sports leagues are the new “it” non-dating dating app of 2026. On paper, Volo is a social sports app. In culture, it’s where people go to find someone without looking like they’re trying that hard.

The sport itself is almost irrelevant. The point is proximity without admission. The more interesting question is: **when did openly wanting a partner start to feel embarrassing?**

Somewhere along the way, desire became something to downplay. Wanting love had to feel ironic. Casual. Accidentally achieved. Otherwise, ewww...right?

So we’ve engineered spaces where connection can unfold without anyone having to confess they were looking for it in the first place.

In 2026, love isn’t uncool. Trying apparently is.`,media:[{url:"https://i.postimg.cc/zXSxVzjL/Screenshot-2026-02-27-at-11-37-51-AM.png",type:"image",alt:"Dating With Plausible Deniability"}]},{id:"march-26-vibe",columnId:"vibe",issueId:"2026-03",title:"The Great Reset",description:"How the vibe shift of 2026 is moving away from irony and back towards radical sincerity.",media:[{url:"https://images.unsplash.com/photo-1514525253344-f2038b430ee1?auto=format&fit=crop&q=80&w=1200",type:"image",alt:"Neon Crowd"}]},{id:"march-26-ai",columnId:"ai",issueId:"2026-03",title:"The 3 AM Agency",description:`I used to worry about what rival agencies were building in their tech stacks. Now, I’m looking over my shoulder at a guy in his bedroom running a 5-billion-token digital employee while he sleeps.

We’ve crossed the threshold from AI as an ”Oracle” (chatbots) to AI as an ”Agent” (models taking over your mouse and keyboard). [Take YouTuber Matt Berman](https://www.youtube.com/watch?v=3110hx3ygp0&feature=youtu.be), for example: he built a fully autonomous digital employee that reads emails, negotiates sponsorships, and updates his CRM. Because this brute-force automation is computationally heavy, he schedules his AI for the ”night shift” at 3:00 AM to avoid API rate limits. Yes, it’s risky - Meta’s AI alignment director recently had her [entire inbox accidentally wiped by an agent](https://www.businessinsider.com/meta-ai-alignment-director-openclaw-email-deletion-2026-2). But solo operators are moving fast and breaking things.

Right now, holding companies are still our main rivals. If a solo operator tried to match our daily output today, their API bill would bankrupt them. But as compute costs inevitably crash, these hyper-empowered individuals running localized ”AI swarms” will scale. Our biggest bottleneck isn’t the tech; it’s our overburdened compliance regimens and internal skill gaps. We have to figure out how to maintain governance without moving so slowly that we get lapped by a guy building a 50-person agency in his bedroom.`,media:[{url:"https://i.postimg.cc/x1NhqDXQ/Screenshot-2026-02-27-at-12-01-03-PM.png",type:"image",alt:"The 3 AM Agency"}],videoUrl:"https://www.youtube.com/watch?v=3110hx3ygp0"},{id:"march-26-anon",columnId:"anon",issueId:"2026-03",title:"The Modern-Day Meta Showmance",description:`The showmance is a Hollywood heirloom, handed down since the dawn of Tinseltown to scrub reputations and inflate box office numbers. While we once settled for a blurry paparazzi shot over a shared pasta bowl, 2026 has traded tabloid fodder for diegetic immersion. Today, a showmance hasn’t succeeded until it triggers a Reddit investigation rather than a magazine cover.

Take the *Wuthering Heights* "Method Press Tour." Margot Robbie and Jacob Elordi didn’t just walk red carpets; they performed "visual melancholy" in custom Schiaparelli, matching signet rings, and gold-initialed teeth. From Elordi filling Robbie’s room with Heathcliff-inspired roses to Robbie’s public claims of "emotional codependency," the duo turned a standard junket into a live-action Pinterest board for the Dark Academia set.

Then there is A24’s *The Drama*. Knowing no one would believe Zendaya and Robert Pattinson are dating, the studio skipped the rumors and went for our mailboxes. By placing a formal engagement announcement in the *Boston Globe* and launching a functional [wedding website](https://charlieandemmaforever.com/?utm_medium=website&utm_source=website_internal&utm_campaign=web_link_1), they invited us to RSVP to a fictional love story. This is the fourth wall of PR collapsing; characters are now inhabiting our reality via real-world infrastructure.

In 2026, authenticity is no longer the metric...engagement is. We’ve traded the hunt for "real love" for committed performances that spill into our feeds. The Meta Showmance replaces audience deception with participation. We aren’t looking for a "happily ever after" in the tabloids; we just want them to commit to the bit.`,media:[{url:"https://i.postimg.cc/d3TQ0TF4/Screenshot-2026-02-27-at-10-20-21-AM.png",type:"image",alt:"Meta Showmance"}]},{id:"march-26-murmurs",columnId:"murmurs",issueId:"2026-03",title:"In Defense of Romance: A 2026 Update",description:`[In Defense of Romance: A 2026 Update](https://www.linkedin.com/pulse/defense-romance-2026-update-erica-chen-zgr9e/)

Romance novels have been having a massive renaissance. Yet, the stigma remains.

I argue that it’s one of the few places where brands can actually connect with women in a meaningful way.

You can reach women in Sports, but you can win them in Romance.

3 ways to start: Enable authors to expand their world. Enventize the Romancelandia community. Exemplify the Normalcy.`,media:[{url:"https://i.postimg.cc/520WtVpn/Screenshot-2026-02-27-at-9-14-41-AM.png",type:"image",alt:"Romance Renaissance"}]},{id:"march-26-theta",columnId:"theta",issueId:"2026-03",title:"7 Ways to Bet on Energy. Or Anything.",description:`We all know the biggest constraint on AI is power (data centers in space!). But did you know there are multiple financial markets all trying to profit on power? All at once. Every second. Right now.

Here are 7 financial instruments from conservative to the risky:

1. Buy a Corporate Bond
2. Buy a Energy ETF
3. Buy a Stock
4. Buy an Option
5. Buy a Future
6. Buy an Event
7. Buy Tokens`,media:[{url:"https://i.postimg.cc/s2p2YWGB/Screenshot-2026-02-27-at-10-07-18-AM.png",type:"image",alt:"All Is Theta Hero"},{url:"https://i.postimg.cc/MGb6Lj0h/Screenshot-2026-02-27-at-11-45-54-AM.png",type:"image",alt:"Corporate Bond"},{url:"https://i.postimg.cc/dVy2MxHQ/Screenshot-2026-02-22-at-11-07-25-AM.png",type:"image",alt:"Energy ETF"},{url:"https://i.postimg.cc/tCVZ7V3G/Screenshot-2026-02-22-at-11-07-34-AM.png",type:"image",alt:"Stock"},{url:"https://i.postimg.cc/7Zk3kNp3/Screenshot-2026-02-22-at-11-08-00-AM.png",type:"image",alt:"Option"},{url:"https://i.postimg.cc/8Phvt6jJ/Screenshot-2026-02-22-at-11-07-50-AM.png",type:"image",alt:"Future"},{url:"https://i.postimg.cc/Jhy4YfPc/Screenshot-2026-02-22-at-11-08-11-AM.png",type:"image",alt:"Event"},{url:"https://i.postimg.cc/cHw10Qq5/Screenshot-2026-02-22-at-11-08-17-AM.png",type:"image",alt:"Tokens"}]},{id:"march-26-influence",columnId:"influence",issueId:"2026-03",title:"How I accidentally became a Gemologist at 2AM",description:`I’ll be the first to admit it: I never really cared for jewelry.

Then, two expensive things happened at once...I got engaged, and #TikTokMadeMeBuyIt took over my life. My ring was the ”gateway drug” that led me to loose stone auctions, skipping retail markups to design my own pieces. (It’s fun, you should try it too!)

I was instantly hooked; I *had* to try it, and then I had to tell all my friends about it. Now, I’m hunting for raw potential instead of viral trends. I guess I traded my doom-scrolling habit for a lesson in personal style - one bid at a time.`,media:[{url:"https://i.postimg.cc/NM6HpMLD/Screenshot-2026-02-27-at-11-42-20-AM.png",type:"image",alt:"Gemology"}]},{id:"march-26-algo-arch",columnId:"algo",issueId:"2026-03",title:"The power of HR",description:"Forget algorithms, this is pure cultural phenomenon largely driven by its ability to tap into, and amplify, specific content, community, and algorithmic trends. ”Heated Rivalry,” a low-budget, niche series, exploded out of nowhere, proving one undeniable truth: the internet is STARVED for authentic LGBTQ+ stories. Fans are obsessively rewatching (some up to 5 times, with Episode 5 being the undisputed MVP) Feeds are flooded with edits, fan theories, and emotional breakdowns. The ripple effect is WILD: a 1000%+ surge in book popularity, ice hockey ticket sales soaring, and real-life players coming out. This isn’t just entertainment; it’s a movement. Lives are changing.",media:[{url:"https://i.postimg.cc/rsvzT2ds/Screenshot-2026-02-27-at-11-54-03-AM.png",type:"image",alt:"The power of HR"}]},{id:"march-26-sustain",columnId:"sustainably",issueId:"2026-03",title:"Welcome to Solarpunk",description:`Sometimes when sustainability is discussed, people assume that we have to give up the tools and comforts of modernity to do better by the planet. However, Solarpunk, the edgy but sincere movement joining technology with nature, offers a more vibrant vision of the future.

The ‘punk’ in solarpunk comes from its blended roots: not rejecting technology like a luddite, nor blindly embracing it like an ecomodernist, but instead applying technological development to ecological and biological principles to serve the good of the whole.

The ‘solar’ element connects the photosynthetic wonder of plants as light-eaters, with the free energy of the Sun harnessed by solar panels and other forces of nature in wind, water and geothermal energy.

This recent article from [Aeon](https://aeon.co/essays/in-solarpunk-cities-of-the-future-tech-follows-natures-lead?utm_source=substack&utm_medium=email) provides a comprehensive debrief on Solarpunk - tracing its origins in urban design, exploring foundations of its practice (like biomimicry), highlighting current manifestations of the movement (like guerilla gardening), and pointing to mix-modal depictions of an optimistic future.`,media:[{url:"https://i.postimg.cc/L5V4cF38/Screenshot-2026-02-27-at-9-50-41-AM.png",type:"image",alt:"Solarpunk Vision"}]},{id:"march-26-mantras-2",columnId:"mantras",issueId:"2026-03",title:"Be The Storm",description:`This [insanely insightful Substack](https://substack.com/home/post/p-187668318) from Douglas Brundage is a diagnostic masterpiece for the media industry hiding as a take on the lack of taste in tech. The piece argues that modern product development has become a closed loop of obsessive curation, embodied by Jony Ive’s ‘Apple-watchifed’ Ferrari Luce dashboard. Have we mistaken pattern-matching and safe, frictionless design for genuine taste?

A point of view should generate novel emotions that didn’t exist before, right? It’s not a forecast - it’s the storm. The storm creates conversation. The storm hits hard. It leaves its mark. The report just confirms that it’s happening. As marketers, I think it’s our job to connect our brands to more thunder and lightning.

As AI dissolves technical and distributive barriers, the ultimate bottleneck to conjuring the correct storm is not capability, but whether you have a lived-experience-driven point of view strong enough to traffic something meaningful, instead of just adding to the endless pile of paid impressions.

”Premium Reach” and ”Verified Viewability” are the raincoats we wear to not get wet, yet we wonder why consumers aren’t dancing under our rain machine. I fear that an over-focus on building tools to do things that work in more efficient ways will end up turning the most powerful tools in history into better engines for doing the same shit we’ve always done, just with less human interference.

That’s why most media plans in 2026 are like that Ferrari Luce dashboard...sleek, milled, anodized, and profoundly forgettable. No one gets wet. Meanwhile, the eye of the cultural hurricane is more like the MSCHF [Key4All](https://key4all.com/) Car...funky, shared, discordant, democratized.

I’m long on taste because we all have it. We come from different vectors of life, and sharing your niche experience can be the most powerful expression of taste. But the system is optimizing taste storms out of its gears, and if we don’t find ways to bring more stories of a life lived outside the office into our workflow, we’ll keep stacking better ways to add more slop to the pile.

/AM`,media:[{url:"https://i.postimg.cc/jSTfDVZt/Copy-of-It-s-(12).png",type:"image",alt:"Taste Storms"}]},{id:"march-26-anon-2",columnId:"anon",issueId:"2026-03",title:"The Masked Web",description:"Privacy in public spaces.",media:[{url:"https://images.unsplash.com/photo-1501472312651-726afe119ff1?auto=format&fit=crop&q=80&w=1200",type:"image",alt:"Mask"}]},{id:"march-26-dataviz",columnId:"dataviz",issueId:"2026-03",title:"The Global Elite’s Haunts",description:`Within the media industry, we go lengths to follow the global majority’s movements around the world. But how much do we know about the [quiet](https://www.businessinsider.com/reclusive-rich-billionaires-list-secretive-perlmutter-anschultz-mars-barclay-wertheimer-2023-8) 0.001%?

This data vis shows us exactly where the wealthy elite are born and reside, based on the data of 3,100 known billionaires.

Isolating by countries reveals a couple of interesting patterns. For example, the US is a magnet for billionaires born the whole world over, but US-born billionaires tend to stay in the US, or concentrate in metropolises like London, Hong Kong, and Singapore.

Though vast, the dataset doesn’t tell us much about each individual billionaire, leading to questions that could enrich the data. Was the billionaire self-made, or born with a silver spoon? Do migratory billionaires send wealth back home, or do they circulate it where they live? Why do some countries’ billionaires tend to stay in their birthplace, while others don’t?

Just because they’re a silent minority doesn’t mean billionaires are irrelevant to us. The decisions of billionaires resound across the world through policy, big business, and international affairs. Though they might not be part of our target audiences, we (and our clients) have likely been a part of theirs.`,media:[{url:"https://i.postimg.cc/J0X4PBGp/Screenshot-2026-02-27-at-9-39-22-AM.png",type:"image",alt:"Global Elite Haunts"}]},{id:"march-26-sports",columnId:"sports",issueId:"2026-03",title:"Player culture is league culture",description:`The NBA is global now. It has a number of MVP-caliber players from other countries, and the [new format we saw in the NBA All-Star game](https://www.nba.com/news/2026-all-star-teams-announcement) reflected that. But where does that leave the league in an “America first” political climate?

The show *Heated Rivalry* was poised to bring new audiences to Men’s hockey, but based on what we saw in [the aftermath of a USA Men’s gold medal win](https://www.usatoday.com/story/news/politics/2026/02/24/us-mens-hockey-trump-call-heated-rivalry/88844708007/), that doesn’t square with current NHL culture, and the league can’t become something the players are not.

[Unrivaled is setting records](https://www.espn.com/wnba/story/_/id/47784462/unrivaled-players-rave-record-crowd-philly-tour-stop) because the WNBA player culture is strong enough to support the launch of another league. The players know this, and that’s why the new WNBA CBA hasn’t been signed yet, [putting this upcoming WNBA season in jeopardy](https://www.cbssports.com/wnba/news/wnba-revenue-sharing-players-union/).

We mostly deal with the leagues, but the leagues are built on the players, and their collective personal brands and stories drive the culture of the leagues they play in.`,media:[{url:"https://i.postimg.cc/wT0BqNSt/Screenshot-2026-02-27-at-11-32-25-AM.png",type:"image",alt:"Player culture"}]},{id:"march-26-extra",columnId:"extraordinary",issueId:"2026-03",title:"How to be EXTRAordinary #1",description:`Brand teams love “best practice” — often a polished way of copying competitors. The result? Work that looks competent, safe, and forgettable. BBH called it “wind tunnel marketing.”

If you want to be beyond boring, you need freshness: the habit of challenging routine thinking and questioning assumptions others treat as truth. Not chaos — deliberate new angles.

Sticky Wisdom’s shortcuts help: adopt a beginner’s mindset, ask “what if?”, mix perspectives, reverse assumptions, and use analogies.

Creativity has a brutal rule: output is only as good as input. Feed teams recycled thinking and you get polished mediocrity.

Freshness in. Freshness out.`,media:[{url:"https://i.postimg.cc/Y96mCVzT/Screenshot-2026-02-27-at-10-04-32-AM.png",type:"image",alt:"EXTRAordinary angles"}]},{id:"march-26-tokyo",columnId:"tokyo-drift",issueId:"2026-03",title:"The “City Boy” is..",description:`A subculture of the Japanese take on “american casual” - a subculture coined by Popeye in the 70s, and evolved by Akio Hasegawa. This cross-cultural migration of what is “American” has been fully reinterpreted through the lens of distinct Japanese style philosophies like wabi-sabi, a focus on silhouettes, fabric and subtlety.

The City Boy curates meticulously in *painstaking* detail to ironically, appear effortless. It offers a softer take on the modern male and masculinity - creating a genderless appeal making it popular with women alike, as we continue to see fashion continue to blur gender norms.`,media:[{url:"https://i.postimg.cc/j5tHVNp8/Screenshot-2026-02-27-at-11-50-04-AM.png",type:"image",alt:"City Boy"}]},{id:"march-26-aux",columnId:"aux",issueId:"2026-03",title:"The Fall Off",description:`Pitchfork rated J.Cole’s 24-track record a lukewarm 5.3. The streets responded and drove 280,000 first-week sales, debuting the disc at #1 on Billboard.
**In short, institutional authority has lost its weight.**
In an oversaturated market where artists and brands try to hack the algorithm, Cole ignored industry norms and stayed true to himself while [casually riding his bike around NYC](https://www.youtube.com/shorts/CoIYaBYoyVw). The Fall Off teaches us that when you stop trying to engineer a breakthrough, critics become secondary to the artistic expression.

**Life Aux Scenario:**
[When vendors cold-email your inbox](https://www.youtube.com/watch?v=j4NPNp8SEk0&list=RDj4NPNp8SEk0&start_radio=1)`,media:[{url:"https://i.postimg.cc/QtKHyMtb/Screenshot-2026-02-27-at-11-57-32-AM.png",type:"image",alt:"The Fall Off"}],videoUrl:"https://www.youtube.com/watch?v=SXX-YotJDVU"},{id:"march-26-meme",columnId:"meme",issueId:"2026-03",title:"2026: the new 2016?",description:`Memes have evolved from static images into audio-driven, highly participatory trends. The internet’s inside jokes live in comment sections as much as in-feed. While 2025 promised a return to the “golden era” of memes, the first few months of 2026 have proven that digital obsessions still move and expire faster than ever.

Fresh: Punch the Monkey

Stale: 2016 nostalgia

Rotten: “My show is on”`,media:[{url:"https://i.postimg.cc/dDMRxdnV/Screenshot-2026-02-27-at-9-58-07-AM.png",type:"image",alt:"Meme Trends 2026"}]},{id:"march-26-sleeping",columnId:"sleeping",issueId:"2026-03",title:"I learned to speak robot. Beep Boop.",description:`I stayed up looking for an AI cheat code—a secret language to get better, faster work out of our models.

The secret? Stop talking to them like they’re human.

AI hates conversational “agency speak.” The polite fluff (“Hey, could you maybe brainstorm...”) actually makes them less efficient. To speak robot, you have to use Structured English.

Strip the filler. Use tags. Box in their mechanical brains.

\`<context> You are a WPP creative. </context>\`
\`<directive> Write 3 campaign hooks. </directive>\`
\`<constraints> Zero marketing jargon. </constraints>\`

We don’t need to learn Python. Next time you write a prompt, stop writing an email. Write an algorithm.`,media:[{url:"https://i.postimg.cc/G3DXkhX9/Screenshot-2026-02-27-at-10-02-15-AM.png",type:"image",alt:"Speaking Robot"}]},{id:"march-26-zoo",columnId:"zoo",issueId:"2026-03",title:"Domestic Wilds",description:"Amateur zoo keeping at home.",media:[{url:"https://images.unsplash.com/photo-1516734212186-a967f81ad0d7?auto=format&fit=crop&q=80&w=1200",type:"image",alt:"Cat"}]},{id:"march-26-gameboy",columnId:"gameboy",issueId:"2026-03",title:"The Most Energetic, Charismatic Streamer in the World Right Now",description:`“If you watch this guy for 10 minutes, you’ll realize why he has so many viewers. He’s the most energetic, charismatic streamer in the world right now.” - [Reddit User](https://www.reddit.com/r/LivestreamFail/comments/1qxfxe0/comment/o3w2hcb/)
(After five minutes, I was sold.)

Meet the peanut taking over your household’s algorithm. [TheBurntPeanut](https://www.youtube.com/@TheBurntPeanut) is a motion-captured virtual peanut with a crass mouth and a high energy personality. In a digital landscape dominated by human faces, he is an anomaly, a video game-playing peanut with human eyes and lips.

While the look triggers ["Annoying Orange"](https://www.youtube.com/channel/UCi-5OZ2tYuwMLIcEyOsbdRA) flashbacks, the secret to his stardom is that he isn’t a character. The voice and personality are 100% him. He rode the wave of the massive Arc Raiders launch, but he’s staying on top because he makes viewers laugh more than any human creator in the space.

As of February 25th, according to [Streams Charts](https://streamscharts.com/channels?time=30-days), he racked up 10,313,794 hours watched over the last 30 days, outperforming every other streamer on the planet.
